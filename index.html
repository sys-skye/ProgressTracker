<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-Tage Intensiv-Plan - Lernfortschritts-Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 15-Tage Intensiv-Plan</h1>
            <p class="subtitle">Wirtschaftspolitik & Soziale Ungleichheit</p>
            <div class="progress-overview">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="overallProgress"></div>
                </div>
                <span id="progressText">0% abgeschlossen</span>
            </div>
        </header>

        <nav class="phase-nav">
            <button class="phase-btn active" data-phase="all">Alle</button>
            <button class="phase-btn" data-phase="phase1">Phase 1</button>
            <button class="phase-btn" data-phase="phase2">Phase 2</button>
        </nav>

        <main id="daysContainer">
            <!-- Days will be dynamically loaded here -->
        </main>

        <footer>
            <p>Dein Fortschritt wird automatisch gespeichert ✓</p>
            <div id="syncStatus" style="display: none; color: var(--success-color); font-weight: 600; margin: 10px 0;"></div>

            <!-- Cloud sync removed: app now uses localStorage only. -->

            <button id="resetProgress" class="reset-btn">Fortschritt zurücksetzen</button>
        </footer>
    </div>
