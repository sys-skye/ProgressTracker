<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15-Tage Intensiv-Plan - Lernfortschritts-Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 15-Tage Intensiv-Plan</h1>
            <p class="subtitle">Wirtschaftspolitik & Soziale Ungleichheit</p>
            <div class="progress-overview">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="overallProgress"></div>
                </div>
                <span id="progressText">0% abgeschlossen</span>
            </div>
        </header>

        <nav class="phase-nav">
            <button class="phase-btn active" data-phase="all">Alle</button>
            <button class="phase-btn" data-phase="phase1">Phase 1</button>
            <button class="phase-btn" data-phase="phase2">Phase 2</button>
        </nav>

        <main id="daysContainer">
            <!-- Days will be dynamically loaded here -->
        </main>

        <footer>
            <p>Dein Fortschritt wird automatisch gespeichert ✓</p>
            <div id="syncStatus" style="display: none; color: var(--success-color); font-weight: 600; margin: 10px 0;"></div>

            <div class="sync-settings">
                <h3>Cloud-Sync (kostenlos mit GitHub)</h3>
                <div class="sync-inputs">
                    <input type="text" id="gistId" placeholder="GitHub Gist ID" style="margin-right: 10px; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color);">
                    <input type="password" id="gistToken" placeholder="Personal Access Token (optional)" style="margin-right: 10px; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color);">
                    <button id="saveSyncSettings" class="sync-btn">Einstellungen speichern</button>
                </div>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 8px;">
                    Für private Gists benötigst du einen <a href="https://github.com/settings/tokens" target="_blank">Personal Access Token</a> mit Gist-Berechtigung.
                </p>
            </div>

            <button id="resetProgress" class="reset-btn">Fortschritt zurücksetzen</button>
        </footer>
    </div>

    <script>

    </script>
    <script src="app.js"></script>
</body>
</html>
